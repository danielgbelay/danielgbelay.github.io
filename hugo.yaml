params:
  title: "Hugo Profile"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandLogo: "" # Logo for the brand | default is the favicon variable
    showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName:  "Daniel Belay" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : false
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false
      disableBlog: true
      disableGallery: true


  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Daniel Belay"
    subtitle: "Cyber Security & Data Analytics Student"
    content: "I am an Accounting Professional with more than five years of experience and a strong foundation in cybersecurity and data analytics. I am passionate about solving business problems with technology and continuously expanding my technical skills."
    image: /image/daniel.png.png
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "/resume/daniel_belay_resume.pdf"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://example.com
        - icon: fab fa-x-twitter
          url: https://example.com
      customIcons:
        - icon: /fav.png
          url: "https://example.com"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/image/daniel.png.png"
    content: |-
      I am an Accounting Professional with more than five years of experience in accounting and finance, combined with a strong foundation in cyber security and data analytics.

      I completed a Cyber Security Diploma at Trebas Institute and am currently pursuing a Diploma in Data Analytics & Artificial Intelligence at triOS College.

      I enjoy solving business problems using technology, analyzing data, improving processes, and continuously expanding my knowledge in cyber security, artificial intelligence, and business analytics.
    skills:
      enable: true
      title: "Core Skills"
      items:
        - "Cyber Security"
        - "Data Analytics"
        - "SQL"
        - "Python"
        - "Power BI"
        - "Microsoft 365"
        - "QuickBooks"
        - "Microsoft Excel"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "triOS College"
        jobs:
        - name: "Data Analytics & Artificial Intelligence Student"
          date: "2026 - Present"
          content: "Currently pursuing a Diploma in Data Analytics & Artificial Intelligence with hands-on training in Python, SQL, Power BI, machine learning, artificial intelligence, and business analytics."

      - company: "World Wireless Solutions"
        jobs:
        - name: "Cyber Security Co-op Student"
